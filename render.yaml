services:
  - type: web
    name: bbpw
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/bbpw run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false        # you will paste this from Neon
      - key: SESSION_SECRET
        sync: false        # set a long random string (e.g. 64 random chars)
